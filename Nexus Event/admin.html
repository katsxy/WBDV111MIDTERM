<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Nexus</title>
<link rel="stylesheet" href="css/admin.css">
<script defer src="js/admin.js"></script>
</head>

<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo">Nexus Events</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="events.html">Event</a>
        <a href="tickets.html">Ticket</a>
        <a class="active">Admin</a>
    </nav>
</header>

<div class="container">

<section class="admin">

    <!-- LEFT SIDE -->
    <div class="admin-left">
        <h1>Admin Control Room</h1>

        <p>
            Authorized team only. Log in to manage events, ticket tiers,
            venue schedules, and guest communications.
        </p>

        <div class="tags">
            <span>Events</span>
            <span>Tickets</span>
            <span>Venue Ops</span>
            <span>Inbox</span>
        </div>
    </div>

    <!-- RIGHT SIDE LOGIN -->
    <div class="login-box">

        <h3>Admin Login</h3>
        <p class="demo">Demo access: <b>admin / nexus2026</b></p>

        <label>Admin ID</label>
        <input type="text" id="username" placeholder="admin" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <button type="button" id="loginBtn">Enter Dashboard</button>

        <p id="errorMsg"></p>

    </div>

</section>

</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© <span id="year"></span> Nexus Events • All rights reserved.</p>
</footer>
