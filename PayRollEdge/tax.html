<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tax View - PayRoll Edge</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <h2>PayRoll Edge</h2>
        <ul>
            <li onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='staff.html'">Staff</li>
            <li onclick="location.href='timesheets.html'">Timesheets</li>
            <li onclick="location.href='payslips.html'">Payslips</li>
            <li class="active">Tax View</li>
            <li>🔒 Secure • FaceID</li>
        </ul>
    </aside>

    <main class="main">
        <div class="hero">
            <h1>Tax Overview</h1>
            <p>Review calculated tax for your staff.</p>
            <div class="hero-buttons">
                <button onclick="location.href='tax.html'">View Tax</button>
                <button class="secondary" onclick="location.href='export.html'">Export Tax Report</button>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Total Tax</h3>
                <p>$21,450</p>
            </div>
            <div class="card">
                <h3>Pending</h3>
                <p>$2,145</p>
            </div>
            <div class="card">
                <h3>Processed</h3>
                <p>$19,305</p>
            </div>
        </div>

        <div class="quick-actions">
            <div class="action-card" onclick="location.href='tax.html'">
                <i class="fa-solid fa-calculator"></i>
                View Tax
            </div>
            <div class="action-card" onclick="location.href='export.html'">
                <i class="fa-solid fa-file-export"></i>
                Export Tax Report
            </div>
        </div>

        <footer>© 2026 PayRoll Edge Corporate</footer>
    </main>
</div>

</body>
</html>
