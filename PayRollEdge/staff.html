<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff - PayRoll Edge</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <h2>PayRoll Edge</h2>
        <ul>
            <li onclick="location.href='index.html'">Dashboard</li>
            <li class="active">Staff</li>
            <li onclick="location.href='timesheets.html'">Timesheets</li>
            <li onclick="location.href='payslips.html'">Payslips</li>
            <li onclick="location.href='tax.html'">Tax View</li>
            <li>🔒 Secure • FaceID</li>
        </ul>
    </aside>

    <main class="main">
        <div class="hero">
            <h1>Staff Management</h1>
            <p>View and manage all employees in your company.</p>
            <div class="hero-buttons">
                <button onclick="location.href='staff.html'">Add Staff</button>
                <button class="secondary" onclick="location.href='timesheets.html'">Assign Timesheet</button>
                <button class="secondary" onclick="location.href='export.html'">Export Staff Data</button>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Total Staff</h3>
                <p>45</p>
            </div>
            <div class="card">
                <h3>Active</h3>
                <p>42</p>
            </div>
            <div class="card">
                <h3>On Leave</h3>
                <p>3</p>
            </div>
        </div>

        <div class="quick-actions">
            <div class="action-card" onclick="location.href='staff.html'">
                <i class="fa-solid fa-user-plus"></i>
                Add Staff
            </div>
            <div class="action-card" onclick="location.href='timesheets.html'">
                <i class="fa-solid fa-calendar-check"></i>
                Assign Timesheet
            </div>
            <div class="action-card" onclick="location.href='export.html'">
                <i class="fa-solid fa-file-export"></i>
                Export Staff Data
            </div>
        </div>

        <footer>© 2026 PayRoll Edge Corporate</footer>
    </main>
</div>

</body>
</html>
