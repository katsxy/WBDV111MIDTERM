<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payslips - PayRoll Edge</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <h2>PayRoll Edge</h2>
        <ul>
            <li onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='staff.html'">Staff</li>
            <li onclick="location.href='timesheets.html'">Timesheets</li>
            <li class="active">Payslips</li>
            <li onclick="location.href='tax.html'">Tax View</li>
            <li>🔒 Secure • FaceID</li>
        </ul>
    </aside>

    <main class="main">
        <div class="hero">
            <h1>Payslip Viewer</h1>
            <p>Review and export payslips for your staff.</p>
            <div class="hero-buttons">
                <button onclick="location.href='payslips.html'">View Payslip</button>
                <button class="secondary" onclick="location.href='export.html'">Export Payslip</button>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Recent Payslip</h3>
                <p>Apr 01, 2026</p>
            </div>
            <div class="card">
                <h3>Total Staff Paid</h3>
                <p>45</p>
            </div>
            <div class="card">
                <h3>Total Paid</h3>
                <p>$52,000</p>
            </div>
        </div>

        <div class="quick-actions">
            <div class="action-card" onclick="location.href='payslips.html'">
                <i class="fa-solid fa-eye"></i>
                View Payslip
            </div>
            <div class="action-card" onclick="location.href='export.html'">
                <i class="fa-solid fa-file-export"></i>
                Export Payslip
            </div>
        </div>

        <footer>© 2026 PayRoll Edge Corporate</footer>
    </main>
</div>

</body>
</html>
