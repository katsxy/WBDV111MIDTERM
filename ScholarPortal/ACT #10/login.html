<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScholarPortal Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <h2>Student Login</h2>

    <form id="loginForm">
        <input type="text" placeholder="Student ID" id="studentID" 
               required pattern="[0-9]+" inputmode="numeric">

        <input type="email" placeholder="School Email" id="schoolEmail" required>

        <input type="password" placeholder="Password" id="password" required>

        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <span id="enrollNow">Enroll Now</span></p>

</div>

<script src="script.js"></script>

</body>
</html>
