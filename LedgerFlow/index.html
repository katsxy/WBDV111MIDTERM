<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LedgerFlow Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<aside class="sidebar">
    <h2>LedgerFlow</h2>
    <ul>
        <li class="active">Home</li>
        <li onclick="location.href='invoices.html'">Invoices</li>
        <li onclick="location.href='clients.html'">Clients</li>
        <li onclick="location.href='payments.html'">Payments</li>
        <li>🔒 Secure • 2FA Enabled</li>
    </ul>
</aside>

<main class="main">
    <div class="hero">
        <h1>Manage Your Finances<br>with Precision</h1>
        <p>Minimal. Secure. Powerful invoicing system.</p>
        <div class="hero-buttons">
            <button onclick="location.href='invoices.html'">Create Invoice</button>
            <button class="secondary" onclick="location.href='clients.html'">Add Client</button>
            <button class="secondary" onclick="location.href='payments.html'">Record Payment</button>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Invoices</h3>
            <p>24</p>
        </div>
        <div class="card">
            <h3>Clients</h3>
            <p>12</p>
        </div>
        <div class="card">
            <h3>Payments</h3>
            <p>$5,430</p>
        </div>
    </div>

    <div class="quick-actions">
        <div class="action-card" onclick="location.href='invoices.html'">📄 Create Invoice</div>
        <div class="action-card" onclick="location.href='clients.html'">👥 Add Client</div>
        <div class="action-card" onclick="location.href='payments.html'">💳 Record Payment</div>
    </div>

</main>

</div>

</body>
</html>
