<!-- SIGNUP FORM -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - Library Connect</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo">Library Connect</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="library.html">Library</a>
        <a href="aboutus.html">About Us</a>
    </nav>
</header>

<!-- SIGNUP FORM -->
<div class="signup-container">
    <h1>Create Your Account</h1>
    <p>Join Library Connect and start exploring a world of books!</p>

    <form>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required>

        <a href="index.html" class="btn primary">Sign Up</a>
    </form>
</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 Library Connect. All rights reserved.</p>
</footer>

</body>
</html>
